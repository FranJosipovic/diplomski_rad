services:
  postgres:
    image: postgres:16
    container_name: asn-postgres
    environment:
      POSTGRES_DB: asn_db
      POSTGRES_USER: asn_usr
      POSTGRES_PASSWORD: asn_pass
    ports:
      - "5434:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: asn-mosquitto
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
    restart: unless-stopped

volumes:
  postgres_data:
  mosquitto_data: